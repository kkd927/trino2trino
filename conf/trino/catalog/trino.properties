connector.name=trino
connection-url=jdbc:trino://trino-remote:8080/tpch
connection-user=trino
join-pushdown.enabled=true
join-pushdown.strategy=EAGER
trino.remote-delegation.enabled=true
trino.remote-delegation.mode=AUTO
# Demo convenience: convert unsupported columns to varchar instead of hiding them.
unsupported-type-handling=CONVERT_TO_VARCHAR
