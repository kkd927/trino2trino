services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command: >
      'until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo "waiting for MinIO";
        sleep 2;
      done;
      mc mb --ignore-existing local/delta-smoke'

  hive-metastore:
    build:
      context: ./hive-metastore
    image: trino2trino-delta-smoke-hive:4.0.1
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: derby
      HIVE_CUSTOM_CONF_DIR: /delta-smoke/hive-conf
      HADOOP_CLASSPATH: /opt/hadoop/share/hadoop/tools/lib/*
      SERVICE_OPTS: >-
        -Dhive.metastore.warehouse.dir=file:///tmp/hive/warehouse
        -Dfs.s3.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
        -Dfs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
        -Dfs.s3a.endpoint=http://minio:9000
        -Dfs.s3a.access.key=minioadmin
        -Dfs.s3a.secret.key=minioadmin
        -Dfs.s3a.path.style.access=true
        -Dfs.s3a.connection.ssl.enabled=false
    volumes:
      - ./conf/hive:/delta-smoke/hive-conf:ro
    ports:
      - "19083:9083"

  trino-remote-delta:
    image: trinodb/trino:481
    depends_on:
      hive-metastore:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./conf/remote/catalog:/etc/trino/catalog:ro
      - ./sql:/delta-smoke/sql:ro
    ports:
      - "19080:8080"

  trino-local-delta:
    image: trinodb/trino:481
    depends_on:
      - trino-remote-delta
    volumes:
      - ../../target/trino-trino-481:/usr/lib/trino/plugin/trino:ro
      - ./conf/local/catalog:/etc/trino/catalog:ro
      - ./sql:/delta-smoke/sql:ro
    ports:
      - "18080:8080"
