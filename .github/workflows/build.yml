name: Build and Test

on:
  push:
    branches:
      - main
      - "release/trino-*"
  pull_request:
    branches:
      - main
      - "release/trino-*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up JDK 22
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "22"
          cache: maven

      - name: Restore required Trino build metadata
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .mvn/modernizer
          trino_version="$(grep -A 3 '<parent>' pom.xml | grep '<version>' | head -n 1 | sed -E 's/.*<version>([^<]+)<.*/\1/')"

          for file in violations.xml violations-production-code-only.xml; do
            if [[ ! -f ".mvn/modernizer/${file}" ]]; then
              curl -fsSL "https://raw.githubusercontent.com/trinodb/trino/${trino_version}/.mvn/modernizer/${file}" \
                -o ".mvn/modernizer/${file}"
            fi
          done

      - name: Bootstrap missing Trino JDBC dependencies
        shell: bash
        run: .github/scripts/bootstrap-trino-deps.sh

      - name: Build and test
        run: mvn -B clean verify

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-reports
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
          if-no-files-found: ignore
