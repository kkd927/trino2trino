name: Delta Smoke

on:
  workflow_dispatch:

jobs:
  delta-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Restore required Trino build metadata
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .mvn/modernizer
          trino_version="$(grep -A 3 '<parent>' pom.xml | grep '<version>' | head -n 1 | sed -E 's/.*<version>([^<]+)<.*/\1/')"

          for file in violations.xml violations-production-code-only.xml; do
            if [[ ! -f ".mvn/modernizer/${file}" ]]; then
              curl -fsSL "https://raw.githubusercontent.com/trinodb/trino/${trino_version}/.mvn/modernizer/${file}" \
                -o ".mvn/modernizer/${file}"
            fi
          done

      - name: Bootstrap missing Trino JDBC dependencies
        shell: bash
        run: .github/scripts/bootstrap-trino-deps.sh

      - name: Build plugin package
        run: mvn -B -Dair.check.skip-all=true -DskipTests package

      - name: Run Delta smoke test
        run: testing/delta-smoke/run.sh

      - name: Upload Delta smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: delta-smoke-artifacts
          path: |
            target/trino-trino-*.zip
            target/trino-trino-*.jar
          if-no-files-found: warn
